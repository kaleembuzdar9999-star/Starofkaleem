<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-lg p-6">
        <div class="flex justify-between mb-6 items-center">
            <h1 class="text-2xl font-bold">Student Directory</h1>
            <a href="admin.html" class="text-indigo-600 font-bold text-sm">← Back</a>
        </div>
        <div id="list" class="space-y-3"></div>
    </div>
    <script>
        const students = JSON.parse(localStorage.getItem('students')) || [];
        const container = document.getElementById('list');
        if(students.length === 0) container.innerHTML = '<p class="text-center text-slate-400">No students registered yet.</p>';
        students.forEach(s => {
            container.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border">
                    <div><h4 class="font-bold">${s.name}</h4><p class="text-xs text-slate-500">Class: ${s.class} | ${s.phone}</p></div>
                    <span class="text-[10px] font-bold bg-red-100 text-red-600 px-3 py-1 rounded-full uppercase">${s.fee}</span>
                </div>`;
        });
    </script>
</body>
</html>
