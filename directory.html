<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Student Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 font-[Poppins]">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-slate-800">Student Directory (Registered)</h1>
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-indigo-600 text-white">
                    <tr>
                        <th class="p-4">Name</th>
                        <th class="p-4">Class</th>
                        <th class="p-4">Parent Contact</th>
                        <th class="p-4">Fee Status</th>
                    </tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const students = JSON.parse(localStorage.getItem('students')) || [];
        const list = document.getElementById('studentList');
        students.forEach(s => {
            list.innerHTML += `
                <tr class="border-b">
                    <td class="p-4">${s.name}</td>
                    <td class="p-4">${s.class}</td>
                    <td class="p-4">${s.phone}</td>
                    <td class="p-4"><span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs">${s.feeStatus}</span></td>
                </tr>`;
        });
    </script>
</body>
</html>
