<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Hub | Star of Kaleem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-[#0f172a] text-slate-300 min-h-screen">
    <div class="flex flex-col md:flex-row">
        <div class="w-full md:w-80 p-8 bg-[#1e293b] min-h-screen">
            <h2 class="text-2xl font-bold text-white mb-10 flex items-center gap-2">⭐ ADMIN HUB</h2>
            <nav class="space-y-4">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Core Management</p>
                <a href="admission.html" class="block p-3 bg-indigo-600/20 text-indigo-400 rounded-xl border border-indigo-500/30">01. Student Admission</a>
                <a href="directory.html" class="block p-3 hover:bg-slate-800 rounded-xl transition">02. Student Directory</a>
                <a href="fee.html" class="block p-3 hover:bg-slate-800 rounded-xl transition">08. Fee Collection</a>
                <a href="index.html" class="block p-3 text-rose-400 hover:bg-rose-500/10 rounded-xl mt-10">← Logout</a>
            </nav>
        </div>
        <div class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-white mb-6">Welcome, Admin</h1>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="bg-slate-800 p-6 rounded-[2rem] border-b-4 border-indigo-500">
                    <p class="text-xs font-bold text-slate-500 uppercase">Total Students</p>
                    <h3 class="text-3xl font-bold text-white mt-2" id="count">0</h3>
                </div>
            </div>
        </div>
    </div>
    <script>
        // ڈیٹا کی تعداد دکھانے کے لیے
        const students = JSON.parse(localStorage.getItem('students')) || [];
        document.getElementById('count').innerText = students.length;
    </script>
</body>
</html>
