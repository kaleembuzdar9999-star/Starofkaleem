<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fee Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-xl">
        <h2 class="text-2xl font-bold mb-4">Collect Monthly Fee</h2>
        <input type="text" id="studentId" placeholder="Enter Student Name" class="w-full p-4 border rounded-2xl mb-4">
        <input type="number" placeholder="Amount (PKR)" class="w-full p-4 border rounded-2xl mb-4">
        <button onclick="alert('Fee Received and SMS Sent!')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Submit Fee</button>
    </div>
</body>
</html>
